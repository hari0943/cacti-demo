# ============================================================
#  DEMO 3b — Banking: Deep Dive (Ndwl/Ndbl/Nspd optimiser)
#  512KB · direct-mapped · 64B block · 45nm · 1 bank(s) · sequential
#
#  ./cacti -infile ../demo_configs/demo3b_banking_deepdive/banks_1.cfg | grep -E "Access time|Ndwl|Ndbl|Nspd" | head -4
#
#  Expected:
#    1  bank  → 1.880 ns  Ndwl=4 Ndbl=8 Nspd=4   (complex internal layout)
#    2  banks → 1.690 ns  Ndwl=4 Ndbl=4 Nspd=4   (Ndbl halved)
#    4  banks → 1.544 ns  Ndwl=2 Ndbl=4 Nspd=2   (Ndwl halved)
#    8  banks → 1.409 ns  Ndwl=2 Ndbl=2 Nspd=2   ← internal layout fully simplified
#    16 banks → 1.453 ns  Ndwl=2 Ndbl=2 Nspd=1   ← Ndwl/Ndbl can't drop further, gets slower
#    32 banks → 1.379 ns  Ndwl=2 Ndbl=2 Nspd=1   ← recovers slightly
#    64 banks → 1.414 ns  Ndwl=2 Ndbl=2 Nspd=0.5 ← Nspd goes fractional, noisy
# ============================================================

-size (bytes) 524288
-block size (bytes) 64
-associativity 1
-technology (u) 0.045
-UCA bank count 1
-access mode (normal, sequential, fast) - "sequential"

# --- BOILERPLATE ---

