# ============================================================
#  DEMO 3b — Banking: Deep Dive (internal optimiser behaviour)
#  512KB · direct-mapped · 64B block · 45nm · 4 bank(s) · normal
#
#  Run: ./cacti -infile ../demo_configs/demo3b_banking_deepdive/banks_4.cfg | grep -E "Access time|Ndwl|Ndbl|Nspd" | head -4
#
#  Expected:
#    1  bank  → 1.880 ns  Ndwl=4 Ndbl=8 Nspd=4   (complex internal layout)
#    2  banks → 1.690 ns  Ndwl=4 Ndbl=4 Nspd=4   (Ndbl halved)
#    4  banks → 1.544 ns  Ndwl=2 Ndbl=4 Nspd=2   (Ndwl halved)
#    8  banks → 1.409 ns  Ndwl=2 Ndbl=2 Nspd=2   (layout fully simplified)
#    16 banks → 1.453 ns  Ndwl=2 Ndbl=2 Nspd=1   (Ndwl/Ndbl stuck, slower)
#    32 banks → 1.379 ns  Ndwl=2 Ndbl=2 Nspd=1   (recovers slightly)
#    64 banks → 1.414 ns  Ndwl=2 Ndbl=2 Nspd=0.5 (Nspd fractional, noisy)
#
#  This config: Ndwl=2 Ndbl=4 Nspd=2   — Ndwl halved
# ============================================================

-size (bytes) 524288
-block size (bytes) 64
-associativity 1
-technology (u) 0.045
-UCA bank count 4

# --- BOILERPLATE (do not change) ---
-read-write port 1
-exclusive read port 0
-exclusive write port 0
-single ended read ports 0
-page size (bits) 8192
-burst length 8
-internal prefetch width 8
-Data array cell type - "itrs-hp"
-Data array peripheral type - "itrs-hp"
-Tag array cell type - "itrs-hp"
-Tag array peripheral type - "itrs-hp"
-output/input bus width 64
-operating temperature (K) 350
-cache type "cache"
-tag size (b) "default"
-access mode (normal, sequential, fast) - "normal"
-design objective (weight delay, dynamic power, leakage power, cycle time, area) 0:0:0:0:100
-deviate (delay, dynamic power, leakage power, cycle time, area) 20:100000:100000:100000:100000
-NUCAdesign objective (weight delay, dynamic power, leakage power, cycle time, area) 100:100:0:0:100
-NUCAdeviate (delay, dynamic power, leakage power, cycle time, area) 10:10000:10000:10000:10000
-Optimize ED or ED^2 (ED, ED^2, NONE): "ED^2"
-Cache model (NUCA, UCA) - "UCA"
-NUCA bank count 0
-Wire signaling (fullswing, lowswing, default) - "Global_30"
-Wire inside mat - "semi-global"
-Wire outside mat - "semi-global"
-Interconnect projection - "conservative"
-Core count 4
-Cache level (L2/L3) - "L2"
-Add ECC - "true"
-Print level (DETAILED, CONCISE) - "DETAILED"
-Print input parameters - "true"
-Force cache config - "false"
-Ndwl 1
-Ndbl 1
-Nspd 0
-Ndcm 1
-Ndsam1 0
-Ndsam2 0
-Array Power Gating - "false"
-WL Power Gating - "false"
-CL Power Gating - "false"
-Bitline floating - "false"
-Interconnect Power Gating - "false"
-Power Gating Performance Loss 0.01
-dram_type "DDR3"
-io state "READ"
-addr_timing 1.0
-mem_density 4 Gb
-bus_freq 800 MHz
-duty_cycle 1.0
-activity_dq 1.0
-activity_ca 0.5
-num_dq 72
-num_dqs 18
-num_ca 25
-num_clk 2
-num_mem_dq 2
-mem_data_width 8
-rtt_value 10000
-ron_value 34
-num_bobs 1
-capacity 80
-num_channels_per_bob 1
-first metric "Cost"
-second metric "Bandwidth"
-third metric "Energy"
-DIMM model "ALL"
-mirror_in_bob "F"
