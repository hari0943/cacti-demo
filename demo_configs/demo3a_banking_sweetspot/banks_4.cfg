# ============================================================
#  DEMO 3a — Banking: Sweet Spot
#  32KB · direct-mapped · 64B block · 45nm · 4 bank(s) · fast
#
#  ./cacti -infile ../demo_configs/demo3a_banking_sweetspot/banks_4.cfg
#
#  Expected access times:
#    1 bank  → 0.418 ns  (baseline)
#    2 banks → 0.375 ns  ← FASTEST — sweet spot
#    4 banks → 0.404 ns  ← slower than 2! H-tree overhead kicks in
#    8 banks → 0.390 ns
#
#  Ask audience BEFORE running: "Will more banks always be faster?"
# ============================================================

-size (bytes) 32768
-block size (bytes) 64
-associativity 1
-technology (u) 0.045
-UCA bank count 4
-access mode (normal, sequential, fast) - "fast"

